[colors-dark]
# Default foreground/background
foreground={{colors.on_surface.default.hex_stripped}}
background={{colors.surface.default.hex_stripped}}

# Regular colors
regular0={{colors.surface_dim.default.hex_stripped}}         # Black
regular1={{colors.error.default.hex_stripped}}               # Red
regular2={{colors.primary.default.hex_stripped}}             # Green
regular3={{colors.tertiary.default.hex_stripped}}            # Yellow
regular4={{colors.secondary.default.hex_stripped}}           # Blue
regular5={{colors.inverse_primary.default.hex_stripped}}     # Magenta
regular6={{colors.primary_container.default.hex_stripped}}   # Cyan
regular7={{colors.on_surface_variant.default.hex_stripped}}  # White

# Bright colors
bright0={{colors.surface_container_highest.default.hex_stripped}} # Bright Black
bright1={{colors.error_container.default.hex_stripped}}           # Bright Red
bright2={{colors.inverse_primary.default.hex_stripped}}           # Bright Green
bright3={{colors.secondary_container.default.hex_stripped}}       # Bright Yellow
bright4={{colors.primary.default.hex_stripped}}                   # Bright Blue
bright5={{colors.tertiary_container.default.hex_stripped}}        # Bright Magenta
bright6={{colors.tertiary.default.hex_stripped}}                  # Bright Cyan
bright7={{colors.on_surface.default.hex_stripped}}                # Bright White
