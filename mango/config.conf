# Colors
source=~/.config/mango/colors.conf

# Monitor
allow_tearing=1
monitorrule=name:DP-2,width:2560,height:1440,refresh:360,x:1080,y:250,vrr:1
monitorrule=name:HDMI-A-2,width:1920,height:1080,refresh:60,x:0,y:0,vrr:1,rr:1

# On startup
exec-once=waybar
exec-once=awww-daemon

# Window effect
blur=1
blur_layer=1
blur_optimized=1
blur_params_num_passes = 1
blur_params_radius = 5
blur_params_noise = 0.02
blur_params_brightness = 0.9
blur_params_contrast = 0.9
blur_params_saturation = 1.2

border_radius=6
no_radius_when_single=0
focused_opacity=1
unfocused_opacity=0.80

# Animations
animations=1
layer_animations=1
animation_type_open=zoom
animation_type_close=slide
animation_fade_in=1
animation_fade_out=1
tag_animation_direction=0
zoom_initial_ratio=0.3
zoom_end_ratio=0.8
fadein_begin_opacity=0.5
fadeout_begin_opacity=0.8
animation_duration_move=350
animation_duration_open=250
animation_duration_tag=250
animation_duration_close=250
animation_duration_focus=0
animation_curve_open=0.46,1.0,0.29,1
animation_curve_move=0.46,1.0,0.29,1
animation_curve_tag=0.46,1.0,0.29,1
animation_curve_close=0.08,0.92,0,1
animation_curve_focus=0.46,1.0,0.29,1
animation_curve_opafadeout=0.5,0.5,0.5,0.5
animation_curve_opafadein=0.46,1.0,0.29,1

# Scroller Layout Setting
scroller_structs=0
scroller_default_proportion=0.5
scroller_focus_center=0
scroller_prefer_center=0
edge_scroller_pointer_focus=1
scroller_ignore_proportion_single=0
scroller_default_proportion_single=0.85
scroller_proportion_preset=0.5, 0.66667, 0.85

# Master-Stack Layout Setting
new_is_master=1
default_mfact=0.55
default_nmaster=1
smartgaps=1

# Overview Setting
hotarea_size=10
enable_hotarea=0
ov_tab_mode=0
overviewgappi=5
overviewgappo=30

# Misc
no_border_when_single=1
axis_bind_apply_timeout=100
focus_on_activate=1
idleinhibit_ignore_visible=0
sloppyfocus=1
warpcursor=1
focus_cross_monitor=0
focus_cross_tag=0
enable_floating_snap=0
snap_distance=20
cursor_theme=macos-tahoe-cursor
cursor_size=24
drag_tile_to_tile=1

# keyboard
repeat_rate=35
repeat_delay=200
xkb_rules_layout=se

# Trackpad
# need relogin to make it apply
disable_trackpad=0
tap_to_click=1
tap_and_drag=0
drag_lock=1
trackpad_natural_scrolling=1
disable_while_typing=1
middle_button_emulation=0
swipe_min_threshold=1

# Appearance
gappih=7
gappiv=7
gappoh=1
gappov=1
scratchpad_width_ratio=0.8
scratchpad_height_ratio=0.9
borderpx=2

# layout support:
# tile,scroller,grid,deck,monocle,center_tile,vertical_tile,vertical_scroller
tagrule=id:1,layout_name:scroller
tagrule=id:2,layout_name:scroller
tagrule=id:3,layout_name:scroller
tagrule=id:4,layout_name:scroller
tagrule=id:5,layout_name:scroller

# Key Bindings
# reload config
bind=SUPER,a,reload_config

# menu and terminal
bind=SUPER,w,spawn,.config/scripts/theme.sh
bind=SUPER,b,spawn,helium-browser
bind=SUPER,space,spawn,rofi -show drun
bind=SUPER,Return,spawn,foot
bind=SUPER,e,spawn,nautilus

# exit
bind=SUPER,0,spawn,wlogout
bind=SUPER,d,killclient,

# switch window focus
bind=ALT,Tab,focusstack,next
bind=SUPER,h,focusdir,left
bind=SUPER,l,focusdir,right
bind=SUPER,k,focusdir,up
bind=SUPER,j,focusdir,down

# swap window
bind=SUPER+ALT,k,exchange_client,up
bind=SUPER+ALT,j,exchange_client,down
bind=SUPER+ALT,h,exchange_client,left
bind=SUPER+ALT,l,exchange_client,right

bind=SUPER,n,scroller_stack,LEFT
bind=SUPER,m,scroller_stack,RIGHT

# switch window status
bind=SUPER,c,centerwin
bind=SUPER,o,toggleoverview,
bind=SUPER,v,togglefloating,
bind=SUPER,f,togglemaximizescreen,
bind=SUPER+ALT,f,togglefullscreen,
bind=SUPER,t,minimized,
bind=SUPER+ALT,t,restore_minimized
bind=SUPER,s,toggle_scratchpad

# scroller layout
bind=SUPER,r,switch_proportion_preset,

# tag switch
bind=SUPER,i,viewtoleft,0
bind=SUPER,u,viewtoright,0
bind=SUPER+ALT,i,tagtoleft
bind=SUPER+ALT,u,tagtoright

bind=SUPER,1,view,1,0
bind=SUPER,2,view,2,0
bind=SUPER,3,view,3,0
bind=SUPER,4,view,4,0
bind=SUPER,5,view,5,0
bind=SUPER,6,view,6,0
bind=SUPER,7,view,7,0
bind=SUPER,8,view,8,0
bind=SUPER,9,view,9,0

# tag: move client to the tag and focus it
# tagsilent: move client to the tag and not focus it
# bind=Alt,1,tagsilent,1
bind=SUPER+Alt,1,tag,1,0
bind=SUPER+Alt,2,tag,2,0
bind=SUPER+Alt,3,tag,3,0
bind=SUPER+Alt,4,tag,4,0
bind=SUPER+Alt,5,tag,5,0
bind=SUPER+Alt,6,tag,6,0
bind=SUPER+Alt,7,tag,7,0
bind=SUPER+Alt,8,tag,8,0
bind=SUPER+Alt,9,tag,9,0

# movewin
bind=Shift+Alt,k,movewin,+0,-50
bind=Shift+Alt,j,movewin,+0,+50
bind=Shift+ALt,h,movewin,-50,+0
bind=Shift+Alt,l,movewin,+50,+0

# resizewin
bind=ALT,k,resizewin,+0,-50
bind=ALT,j,resizewin,+0,+50
bind=ALT,h,resizewin,-50,+0
bind=ALT,l,resizewin,+50,+0

# Mouse Bindings
mousebind=SUPER,btn_left,moveresize,curmove
mousebind=SUPER,btn_right,moveresize,curresize

axisbind=SUPER,UP,focusdir,LEFT
axisbind=SUPER,DOWN,focusdir,RIGHT
axisbind=SUPER+ALT,UP,exchange_client,left
axisbind=SUPER+ALT,DOWN,exchange_client,right

axisbind=SHIFT,UP,viewtoleft,0
axisbind=SHIFT,DOWN,viewtoright,0
axisbind=SHIFT+ALT,UP,tagtoleft,0
axisbind=SHIFT+ALT,DOWN,tagtoright,0

# Touchpad Bindings
gesturebind=none,left,3,focusdir,left
gesturebind=none,right,3,focusdir,right
gesturebind=none,down,3,viewtoleft
gesturebind=none,up,3,viewtoright

gesturebind=none,right,4,exchange_client,right
gesturebind=none,left,4,exchange_client,left
gesturebind=none,down,4,tagtoright
gesturebind=none,up,4,tagtoleft
# layer rule
layerrule=animation_type_open:fade,layer_name:wofi
layerrule=animation_type_close:none,layer_name:wofi

# brightness, volume
bind=NONE,XF86MonBrightnessUp,spawn,brightnessctl s +2%
bind=SHIFT,XF86MonBrightnessUp,spawn,brightnessctl s 100%
bind=NONE,XF86MonBrightnessDown,spawn,brightnessctl s 2%-
bind=SHIFT,XF86MonBrightnessDown,spawn,brightnessctl s 1%

bind=NONE,XF86AudioRaiseVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%+
bind=NONE,XF86AudioLowerVolume,spawn,wpctl set-volume @DEFAULT_SINK@ 5%-
bind=NONE,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SINK@ toggle
bind=SHIFT,XF86AudioMute,spawn,wpctl set-mute @DEFAULT_SOURCE@ toggle

bind=NONE,XF86AudioNext,spawn,playerctl next
bind=NONE,XF86AudioPrev,spawn,playerctl previous
bind=NONE,XF86AudioPlay,spawn,playerctl play-pause
